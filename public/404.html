<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    (function() {
      var path = window.location.pathname;
      if (path.startsWith('/pentestX/') || path === '/pentestX') {
        var newPath = path.replace('/pentestX', '/RedX');
        window.location.replace('https://furious-05.github.io' + newPath);
      } else {
        document.body.innerHTML = '<h1>404 - Page Not Found</h1><p><a href="/RedX/">Go to RedX</a></p>';
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
